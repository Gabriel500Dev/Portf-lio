<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio R$10.000</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin-bottom: 10px; }
    p { margin-top: 0; color: #555; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-width: 420px;
      margin: 20px auto;
    }@media (min-width: 768px) {
  .grid {
    grid-template-columns: repeat(8, 1fr);
    max-width: 800px;
  }
}

@media (min-width: 1200px) {
  .grid {
    grid-template-columns: repeat(16, 1fr);
    max-width: 1100px;
  }
}
.cell {
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px 0;
  cursor: pointer;
  user-select: none;
  border-radius: 6px;
  font-weight: bold;
  transition: 0.2s;
}
.cell:hover { transform: scale(1.05); }
.checked {
  background: #ff4d4d;
  color: #fff;
  border-color: #ff4d4d;
}
.footer {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
button {
  margin-top: 15px;
  padding: 10px 18px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #333;
  color: #fff;
}
canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

  </style>
</head>
<body>
  <h1>💰 Desafio dos R$10.000</h1>
  <p>Clique em um valor por dia. Ele ficará marcado em vermelho.</p>  <div class="grid" id="grid"></div>  <div class="footer">
    Total marcado: R$ <span id="total">0</span>
  </div><button onclick="resetar()">Resetar manualmente</button>

<canvas id="confetti"></canvas>

  <script>
    const valores = [
      200,5,10,10,5,100,5,20,5,100,20,5,20,50,50,5,
      10,100,5,20,10,5,20,5,10,20,10,20,5,50,20,20,
      100,5,10,5,50,20,20,200,5,200,5,10,20,5,100,50,
      50,20,200,200,100,20,10,20,10,100,10,5,10,20,5,10,
      5,10,20,10,10,20,50,5,50,5,20,200,10,20,5,50,
      20,5,20,10,20,10,5,20,10,100,50,10,50,50,20,5,
      50,100,20,5,20,5,500,10,5,5,10,5,100,5,20,100,
      5,10,5,20,100,5,20,50,50,20,50,10,20,200,5,50,
      10,10,10,5,5,10,20,50,10,500,5,10,20,500,20,5,
      50,5,20,20,200,5,20,20,5,10,50,200,5,20,100,50,
      50,10,10,20,5,50,50,100,10,5,20,20,5,10,5,100,
      100,5,200,20,5,20,50,10,5,20,100,5,50,5,50,10,
      5,10,50,20,10,100,200,5,50,5,100,20,200,5,20,5,
      20,20,100,5,20,5,5,20,50,20,10,20,10,20,5,100,
      5,20,10,5,10,10,20,5,20,5,20,5,20,5,20,5,
      100,5,20,10,100,5,10,100,5,10,5,100,20,10,5,20
    ];

    const grid = document.getElementById('grid');
    const totalSpan = document.getElementById('total');
    let marcados = JSON.parse(localStorage.getItem('marcados')) || [];

    function render() {
      grid.innerHTML = '';
      let total = 0;

      valores.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.textContent = v;

        if (marcados.includes(i)) {
          div.classList.add('checked');
          total += v;
        }

        div.onclick = () => toggle(i, v);
        grid.appendChild(div);
      });

      totalSpan.textContent = total;

      if (total >= 10000) {
        celebrar();
      }
    }

    function toggle(index, valor) {
      if (marcados.includes(index)) {
        marcados = marcados.filter(i => i !== index);
      } else {
        marcados.push(index);
      }
      localStorage.setItem('marcados', JSON.stringify(marcados));
      render();
    }

    function resetar() {
      if (confirm('Deseja zerar toda a tabela?')) {
        localStorage.removeItem('marcados');
        marcados = [];
        render();
      }
    }

    /* Confetes simples */
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let confetes = [];

    function celebrar() {
      alert('🎉 Parabéns! Você completou o desafio dos R$10.000!');
      iniciarConfetes();
      setTimeout(() => resetar(), 3000);
    }

    function iniciarConfetes() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      confetes = Array.from({ length: 200 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 4,
        d: Math.random() * 5 + 2
      }));
      animar();
    }

    function animar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,0,0,0.8)';
      confetes.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
        c.y += c.d;
      });
      if (confetes.some(c => c.y < canvas.height)) {
        requestAnimationFrame(animar);
      }
    }

    render();
  </script></body>
</html>
