<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Projetos</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#05080f; /* fundo sólido (corrige o bug) */
    color:white;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(0,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.015) 1px, transparent 1px);

    background-size: 50px 50px;

    animation:gridMove 40s linear infinite;

    filter: blur(0.3px); /* suaviza tudo */

    z-index:-2;
}

/* LUZ (separada do grid) */
body::after{
    content:"";
    position:fixed;
    inset:0;

    background:
        radial-gradient(circle at 50% 20%, rgba(0,255,255,0.08), transparent 60%),
        radial-gradient(circle at 50% 80%, rgba(0,255,255,0.05), transparent 60%);

    z-index:-1;
}

/* ANIMAÇÃO CORRIGIDA */
@keyframes gridMove {
    from {
        background-position: 0 0, 0 0;
    }
    to {
        background-position: 50px 50px, 50px 50px;
    }
}

.container{
    padding:60px 20px 80px;
    text-align:center;
    max-width:1100px;
    margin:auto;
}

h1{
    font-size:clamp(2rem,5vw,3rem);
    margin-bottom:40px;
    letter-spacing:4px;

    background:linear-gradient(90deg,yellow,white,yellow);
    background-size:200%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:glow 4s linear infinite;
}

h2{
    background:linear-gradient(90deg,#00ffff,#00ff9d,#00ffff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:glow 4s linear infinite;
}

@keyframes glow{
    0%{background-position:0%;}
    100%{background-position:200%;}
}

.lista{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.projeto{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,255,0.2);

    padding:30px;
    border-radius:20px;
    font-size:1.2rem;

    transition:.35s;
    cursor:pointer;

    position:relative;
    overflow:hidden;
}

/* brilho animado */
.projeto::before{
    content:"";
    position:absolute;

    width:150%;
    height:150%;

    background:linear-gradient(120deg,transparent,rgba(0,255,255,0.4),transparent);

    transform:rotate(25deg);

    top:-100%;
    left:-100%;

    transition:.5s;
}

.projeto:hover::before{
    top:100%;
    left:100%;
}

.projeto:hover{
    transform:translateY(-8px) scale(1.04);

    box-shadow:0 0 25px #00ffff,
               inset 0 0 15px rgba(0,255,255,0.3);

    border-color:#00ffff;
}

a, a:visited, a:hover, a:active{
    text-decoration:none;
    color:inherit;
}
</style>
</head>
<body>

<div class="container">
<h1>Brawl Stars</h1>
    <h2>Minhas vitórias e conquistas do Brawl Stars!</h2>
    <br>
    <div class="lista">
<a href="https://vt.tiktok.com/ZSutG6aHe/"><div class="projeto">Liberando o Sirius</div></a>

    
    
</div>

</div>

</body>
</html>
